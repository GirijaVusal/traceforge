    <script>
        let sessionGroups = {};

        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            const isDark = html.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const isDark = document.documentElement.classList.contains('dark');
            const icon = document.getElementById('themeIcon');
            icon.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
            lucide.createIcons();
        }

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const lines = event.target.result.split('\n');
                const rawTraces = lines.filter(l => l.trim()).map(line => JSON.parse(line));
                
                sessionGroups = {};
                rawTraces.forEach(trace => {
                    const sId = trace.metadata?.session_id || `indiv-${trace.trace_id}`;
                    if (!sessionGroups[sId]) sessionGroups[sId] = [];
                    sessionGroups[sId].push(trace);
                });
                renderSidebar();
            };
            reader.readAsText(file);
        });

    function renderSidebar() {
    const container = document.getElementById('sidebarItems');
    const search = document.getElementById('searchInput').value.toLowerCase();
    container.innerHTML = '';

    // 1. Convert groups to an array and sort by the timestamp of the LATEST trace in that group
    const sortedSessions = Object.keys(sessionGroups).sort((a, b) => {
        const lastTraceA = sessionGroups[a][sessionGroups[a].length - 1];
        const lastTraceB = sessionGroups[b][sessionGroups[b].length - 1];
        return new Date(lastTraceB.start_time) - new Date(lastTraceA.start_time);
    });

    // 2. Render the sorted list
    sortedSessions.forEach(sId => {
        const traces = sessionGroups[sId];
        // The first trace usually contains the initial user query
        const firstUserMsg = traces[0].spans[0]?.inputs?.args?.[0]?.messages?.[0]?.content || "Empty";
        const lastActivity = new Date(traces[traces.length - 1].start_time);
        
        if (sId.toLowerCase().includes(search) || firstUserMsg.toLowerCase().includes(search)) {
            const div = document.createElement('div');
            div.className = "p-3 rounded-xl cursor-pointer hover:bg-white dark:hover:bg-slate-800/50 transition-all border border-transparent hover:border-gray-200 dark:hover:border-slate-700 group";
            div.innerHTML = `
                <div class="flex justify-between items-center mb-1">
                    <span class="text-[9px] font-black text-blue-500 uppercase">${sId.startsWith('indiv-') ? 'Standalone' : 'Session'}</span>
                    <span class="text-[9px] text-gray-400 font-mono">${lastActivity.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                </div>
                <div class="font-bold text-sm truncate dark:text-slate-200">${sId.startsWith('indiv-') ? firstUserMsg : sId}</div>
                <div class="text-[11px] text-gray-500 truncate mt-1 group-hover:text-blue-500 transition-colors italic">"${firstUserMsg}"</div>
            `;
            div.onclick = () => selectSession(sId, div);
            container.appendChild(div);
        }
    });
}


        function selectSession(sId, element) {
            document.querySelectorAll('#sidebarItems div').forEach(d => d.classList.remove('bg-white', 'dark:bg-slate-800', 'border-gray-200', 'dark:border-slate-700', 'shadow-sm'));
            element.classList.add('bg-white', 'dark:bg-slate-800', 'border-gray-200', 'dark:border-slate-700', 'shadow-sm');

            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('sessionContent').classList.remove('hidden');
            document.getElementById('headerSessionId').innerText = sId.startsWith('indiv') ? 'Single Run' : sId;
            document.getElementById('turnCount').innerText = `${sessionGroups[sId].length} Turn(s)`;
            
            const container = document.getElementById('threadContainer');
            container.innerHTML = '';

            // LATEST ON TOP: Reverse the array for rendering
            const reversedTraces = [...sessionGroups[sId]].reverse();

            reversedTraces.forEach((trace, idx) => {
                const span = trace.spans[0];
                const messages = span.outputs?.result?.messages || [];
                const userQuery = span.inputs?.args?.[0]?.messages?.[0]?.content || "User Query";
                
                const turnDiv = document.createElement('div');
                turnDiv.className = "turn-wrapper";
                
                // COLLAPSE DEFAULT: Only the top (latest) one is open
                const isOpen = (idx === 0);

                turnDiv.innerHTML = `
                    <div class="flex items-center justify-between bg-white dark:bg-slate-800 p-4 rounded-xl border dark:border-slate-700 cursor-pointer shadow-sm hover:border-blue-500/50 transition-all" onclick="toggleTurn(this)">
                        <div class="flex items-center gap-4 overflow-hidden">
                            <div class="w-8 h-8 rounded-lg bg-blue-500/10 flex items-center justify-center text-[10px] font-black text-blue-500">
                                ${reversedTraces.length - idx}
                            </div>
                            <span class="font-bold text-sm truncate dark:text-slate-200">${userQuery}</span>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="text-[10px] font-mono text-gray-400">${span.duration_ms.toFixed(0)}ms</span>
                            <i data-lucide="chevron-down" class="w-4 h-4 transition-transform ${isOpen ? 'rotate-180' : ''}"></i>
                        </div>
                    </div>
                    <div class="collapsible-content ${isOpen ? 'open' : ''}">
                        <div class="p-6 space-y-8 relative ml-4 border-l-2 dark:border-slate-800">
                            <div id="msg-container-${idx}"></div>
                        </div>
                    </div>
                `;
                container.appendChild(turnDiv);
                renderMessages(messages, `msg-container-${idx}`);
            });
            lucide.createIcons();
        }

        function toggleTurn(header) {
            const content = header.nextElementSibling;
            const icon = header.querySelector('[data-lucide="chevron-down"]');
            const isOpen = content.classList.toggle('open');
            icon.style.transform = isOpen ? 'rotate(180deg)' : 'rotate(0deg)';
        }

function renderMessages(messages, containerId) {
    const container = document.getElementById(containerId);
    container.innerHTML = ''; 


    let allMessages = [];
    spans.forEach(span => {
        const result = span.outputs?.result;
        if (!result) return;

        // 1. Handle Agent Format: { "messages": [...] }
        if (result.messages && Array.isArray(result.messages)) {
            allMessages.push(...result.messages);
        } 
        // 2. Handle Tool Format: [ {...}, {...} ]
        else if (Array.isArray(result)) {
            // Use flat(Infinity) just in case there's double nesting like in Vector Retrieval
            allMessages.push(...result.flat(Infinity));
        }
    });


    messages.forEach((msg) => {
        const type = msg.type; 
        const data = msg.data || {};
        const content = data.content || '';
        const additional = data.additional_kwargs || {};
        const reasoning = additional.reasoning_content;
        const toolCalls = data.tool_calls || [];
        const usage = additional.usage || {};
        const totalTokens = usage.total_tokens;

        let icon = "user";
        // Gradient accents and glass effects
        let iconWrapper = "bg-white dark:bg-slate-800 text-slate-500 shadow-sm border border-slate-200 dark:border-slate-700";
        
        if (type === 'ai') { 
            icon = "bot"; 
            iconWrapper = "bg-gradient-to-br from-blue-500 to-blue-700 text-white shadow-blue-500/20 shadow-lg"; 
        }
        if (type === 'tool') { 
            icon = "wrench"; 
            iconWrapper = "bg-gradient-to-br from-purple-500 to-purple-700 text-white shadow-purple-500/20 shadow-lg"; 
        }

        const msgDiv = document.createElement('div');
        msgDiv.className = "relative pl-12 mb-10 group animate-in fade-in slide-in-from-bottom-2 duration-300";
        
        msgDiv.innerHTML = `
            <div class="absolute left-[11px] top-8 bottom-[-40px] w-[2px] bg-slate-100 dark:bg-slate-800/50 group-last:hidden"></div>

            <div class="absolute left-0 top-0 w-6 h-6 rounded-lg flex items-center justify-center z-10 transition-transform group-hover:scale-110 ${iconWrapper}">
                <i data-lucide="${icon}" class="w-3.5 h-3.5"></i>
            </div>

            <div class="flex flex-col gap-1.5">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <span class="text-[10px] font-bold uppercase tracking-[0.15em] text-slate-400 dark:text-slate-500">${type}</span>
                        ${totalTokens ? `
                            <div class="flex items-center gap-1 px-2 py-0.5 rounded-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-[9px] font-medium text-slate-500">
                                <span class="w-1 h-1 rounded-full bg-slate-400"></span>
                                ${totalTokens} tokens
                            </div>
                        ` : ''}
                    </div>
                    <span class="font-mono text-[9px] text-slate-300 dark:text-slate-700 opacity-0 group-hover:opacity-100 transition-opacity">
                        ${msg.session_id || 'no-session'}
                    </span>
                </div>

                <div class="text-sm leading-relaxed text-slate-700 dark:text-slate-300 selection:bg-blue-100 dark:selection:bg-blue-900/30">
                    ${content ? content : (type === 'ai' && toolCalls.length > 0 ? '<span class="text-slate-400 italic">Initiating tool sequence...</span>' : '')}
                </div>
                
                ${reasoning ? `
                    <div class="mt-4 overflow-hidden rounded-2xl border border-slate-200/60 dark:border-slate-800/60 bg-white/50 dark:bg-slate-900/40 backdrop-blur-sm">
                        <div class="flex items-center gap-2 px-4 py-2 border-b border-slate-200/60 dark:border-slate-800/60 bg-slate-50/50 dark:bg-slate-800/30">
                            <i data-lucide="brain" class="w-3 h-3 text-blue-500"></i>
                            <span class="text-[9px] font-bold text-slate-500 uppercase tracking-wider">Reasoning Engine</span>
                        </div>
                        <div class="p-4 text-xs text-slate-600 dark:text-slate-400 leading-relaxed antialiased">
                            ${reasoning}
                        </div>
                    </div>
                ` : ''}
                
                ${toolCalls.length > 0 ? toolCalls.map(tc => `
                    <div class="mt-3 overflow-hidden rounded-xl border border-slate-800 bg-[#0d1117] shadow-xl shadow-black/20">
                        <div class="flex items-center justify-between px-3 py-1.5 bg-[#161b22] border-b border-slate-800">
                            <div class="flex items-center gap-2">
                                <div class="flex gap-1">
                                    <div class="w-2 h-2 rounded-full bg-red-500/20"></div>
                                    <div class="w-2 h-2 rounded-full bg-amber-500/20"></div>
                                    <div class="w-2 h-2 rounded-full bg-emerald-500/20"></div>
                                </div>
                                <span class="text-[9px] font-mono text-slate-500 uppercase ml-2">Execution Logs</span>
                            </div>
                            <i data-lucide="terminal" class="w-3 h-3 text-slate-600"></i>
                        </div>
                        <div class="p-4 font-mono text-[11px] leading-6">
                            <div class="flex items-start gap-2">
                                <span class="text-emerald-500">➜</span>
                                <div class="flex-1">

        <header class="bg-[#111622] border-b border-slate-800 px-8 py-4 flex justify-between items-center shrink-0">
            <div class="flex items-center gap-4 cursor-pointer" onclick="goHome()">
                <div class="bg-blue-600 p-2 rounded-xl text-white shadow-lg shadow-blue-500/20"><i data-lucide="zap" class="w-5 h-5"></i></div>
                <h1 class="text-xl font-bold tracking-tight text-white">TraceForge <span class="text-blue-500 ml-1 opacity-50 text-sm font-mono">v2.5</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="toggleTheme()" class="p-2 rounded-lg bg-slate-800 text-slate-400 hover:text-white transition border border-slate-700"><i data-lucide="sun" id="themeIcon" class="w-4 h-4"></i></button>
                <input type="file" id="fileInput" class="hidden" accept=".jsonl,.json">
                <button onclick="document.getElementById('fileInput').click()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-xl text-sm font-semibold transition shadow-lg shadow-blue-500/20">Import Logs</button>
            </div>
        </header>

        <main id="inspector" class="hidden flex-1 flex overflow-hidden">
            <div class="w-80 border-r border-slate-800 bg-[#0d111c] flex flex-col">
                <div class="p-6 border-b border-slate-800">
                    <button onclick="goHome()" class="mb-6 text-[11px] font-bold text-slate-500 hover:text-blue-400 flex items-center gap-2 uppercase tracking-widest"><i data-lucide="arrow-left" class="w-4 h-4"></i> Projects</button>
                    <div id="projectTokenBadge" class="w-full mb-6 px-3 py-2 rounded-lg bg-amber-500/10 border border-amber-500/20 text-amber-500 text-[10px] font-mono flex items-center gap-2">
                        <i data-lucide="database" class="w-3 h-3"></i>
                        <span>PROJECT: <span id="projectTotalTokens" class="font-bold">0</span> tokens</span>
                    </div>
                    <div class="relative"><i data-lucide="search" class="w-4 h-4 absolute left-4 top-3.5 text-slate-500"></i><input type="text" id="sessionSearch" onkeyup="filterSessions()" placeholder="Search..." class="w-full pl-11 pr-4 py-3 rounded-xl border border-slate-800 bg-[#161b29] text-sm text-white outline-none focus:ring-1 focus:ring-blue-500"></div>
                </div>
                <div class="flex-1 overflow-y-auto p-3 space-y-1" id="sidebarItems"></div>
            </div>

            <div class="flex-1 overflow-y-auto p-10 bg-[#0b0f1a]" id="viewport">
                <div id="emptyState" class="h-full flex flex-col items-center justify-center text-slate-600"><i data-lucide="terminal" class="w-12 h-12 opacity-20 mb-4"></i><p>Select a session to view metrics</p></div>
                <div id="sessionContent" class="hidden max-w-5xl mx-auto">
                    <div id="sessionStats" class="grid grid-cols-4 gap-4 mb-4"></div>
                    
                    <div id="toolBreakdown" class="hidden mb-10 p-6 bg-[#111622] border border-slate-800 rounded-2xl shadow-2xl">
                        <h4 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Avg Tool Latency Breakdown</h4>
                        <div id="toolTable" class="space-y-2"></div>
                    </div>

                    <div id="threadContainer" class="space-y-6 pb-20"></div>
                </div>
            </div>
        </main>

        <div id="projectGallery" class="flex-1 overflow-y-auto p-12 max-w-6xl mx-auto w-full">
            <h2 class="text-4xl font-black text-white mb-8 tracking-tighter">Projects</h2>
            <div id="projectGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </div>

    <script>
        let projectGroups = {}; let sessionGroups = {};

        function getMsgTokens(msg) { 
            const usage = msg.data?.additional_kwargs?.usage || msg.data?.usage_metadata || msg.usage_metadata || {};
            return usage.total_tokens || 0; 
        }

        function getDuration(start, end) { return start && end ? ((new Date(end) - new Date(start)) / 1000) : 0; }

        function toggleBox(header) {
            const content = header.nextElementSibling;
            const icon = header.querySelector('.chevron-icon');
            const isOpen = content.classList.toggle('open');
            if(icon) icon.style.transform = isOpen ? 'rotate(180deg)' : 'rotate(0deg)';
        }

        function toggleToolBreakdown() { document.getElementById('toolBreakdown').classList.toggle('hidden'); }

        document.getElementById('fileInput').addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const lines = ev.target.result.split('\n').filter(l => l.trim());
                projectGroups = {};
                lines.forEach(line => {
                    const t = JSON.parse(line);
                    const p = t.project || "Default";
                    if (!projectGroups[p]) projectGroups[p] = [];
                    projectGroups[p].push(t);
                });
                renderProjects();
            };
            reader.readAsText(e.target.files[0]);
        });

        function renderProjects() {
            const grid = document.getElementById('projectGrid'); grid.innerHTML = '';
            document.getElementById('inspector').classList.add('hidden');
            document.getElementById('projectGallery').classList.remove('hidden');
            Object.keys(projectGroups).forEach(p => {
                const card = document.createElement('div');
                card.className = "bg-[#111622] p-6 rounded-2xl border border-slate-800 hover:border-blue-500 cursor-pointer shadow-xl";
                card.innerHTML = `<h3 class="text-xl font-bold text-white">${p}</h3><p class="text-xs text-slate-500 font-mono">${projectGroups[p].length} Traces</p>`;
                card.onclick = () => selectProject(p);
                grid.appendChild(card);
            });
            lucide.createIcons();
        }

        function selectProject(p) {
            document.getElementById('projectGallery').classList.add('hidden');
            document.getElementById('inspector').classList.remove('hidden');
            sessionGroups = {}; let projectTotal = 0;
            projectGroups[p].forEach(t => {
                const s = t.metadata?.session_id || "no-session";
                if (!sessionGroups[s]) sessionGroups[s] = [];
                sessionGroups[s].push(t);
                (t.spans?.[0]?.outputs?.result?.messages || []).forEach(m => projectTotal += getMsgTokens(m));
            });
            document.getElementById('projectTotalTokens').innerText = projectTotal.toLocaleString();
            renderSidebar();
        }

        function renderSidebar() {
            const container = document.getElementById('sidebarItems'); container.innerHTML = '';
            const sortedIds = Object.keys(sessionGroups).sort((a, b) => new Date(sessionGroups[b][0].start_time) - new Date(sessionGroups[a][0].start_time));
            sortedIds.forEach(s => {
                const traces = sessionGroups[s]; const dateObj = new Date(traces[0].start_time);
                let sessionTokens = 0; traces.forEach(t => (t.spans?.[0]?.outputs?.result?.messages || []).forEach(m => sessionTokens += getMsgTokens(m)));
                const div = document.createElement('div');
                div.className = "session-item p-4 rounded-xl cursor-pointer hover:bg-slate-800/50 border border-transparent hover:border-slate-700 mb-1";
                div.innerHTML = `<div class="flex flex-col gap-1"><div class="flex justify-between text-[10px] font-bold uppercase text-slate-500"><span class="text-blue-500">Session</span><span>${dateObj.toLocaleDateString([], {month:'short', day:'numeric'})}</span></div><div class="text-white text-sm mono truncate">${s}</div><div class="flex justify-between items-center"><div class="text-[11px] text-slate-500 flex items-center gap-1"><i data-lucide="clock" class="w-3 h-3"></i><span>${dateObj.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span></div><span class="text-[10px] font-mono text-emerald-500 bg-emerald-500/10 px-1.5 rounded">${sessionTokens.toLocaleString()} tkn</span></div></div>`;
                div.onclick = () => { document.querySelectorAll('.session-item').forEach(el => el.classList.remove('bg-slate-800', 'border-slate-700')); div.classList.add('bg-slate-800', 'border-slate-700'); selectSession(s); };
                container.appendChild(div);
            });
            lucide.createIcons();
        }

        function selectSession(sId) {
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('sessionContent').classList.remove('hidden');
            document.getElementById('toolBreakdown').classList.add('hidden');
            const container = document.getElementById('threadContainer'); container.innerHTML = '';
            const statsContainer = document.getElementById('sessionStats'); 
            const toolTable = document.getElementById('toolTable');
            toolTable.innerHTML = '';

            const traces = sessionGroups[sId].sort((a, b) => new Date(b.start_time) - new Date(a.start_time));
            
            // Analytics Calc
            let totalTokens = 0, totalTime = 0, responseCount = 0;
            let toolMetrics = {};

            traces.forEach(t => {
                totalTokens += (t.spans?.[0]?.outputs?.result?.messages || []).reduce((acc, m) => acc + getMsgTokens(m), 0);
                totalTime += getDuration(t.start_time, t.end_time);
                const messages = t.spans?.[0]?.outputs?.result?.messages || [];
                messages.forEach(m => {
                    if (m.type === 'ai') responseCount++;
                    (m.data?.tool_calls || m.tool_calls || []).forEach(c => {
                        if (!toolMetrics[c.name]) toolMetrics[c.name] = { count: 0, totalTime: 0 };
                        toolMetrics[c.name].count++;
                        toolMetrics[c.name].totalTime += getDuration(t.start_time, t.end_time);
                    });
                });
            });

            const toolsArray = Object.entries(toolMetrics).map(([name, data]) => ({ name, avg: data.totalTime / data.count })).sort((a,b) => b.avg - a.avg);
            const slowestTool = toolsArray[0]?.name || "None";

            // Restored Dashboard
            statsContainer.innerHTML = `
                <div onclick="toggleToolBreakdown()" class="dashboard-card p-4 rounded-2xl border border-red-500/20 bg-red-500/5 hover:bg-red-500/10 cursor-pointer">
                    <span class="text-[9px] font-bold text-red-400 uppercase tracking-widest block mb-1">Bottleneck Tool</span>
                    <span class="text-lg font-bold text-red-400 truncate block">${slowestTool}</span>
                </div>
                <div class="dashboard-card p-4 rounded-2xl border border-slate-800 bg-slate-800/20">
                    <span class="text-[9px] font-bold text-slate-500 uppercase tracking-widest block mb-1">Avg Turn Time</span>
                    <span class="text-lg font-bold text-amber-400 block">${(totalTime / traces.length).toFixed(2)}s</span>
                </div>
                <div class="dashboard-card p-4 rounded-2xl border border-slate-800 bg-slate-800/20">
                    <span class="text-[9px] font-bold text-slate-500 uppercase tracking-widest block mb-1">Avg Tokens</span>
                    <span class="text-lg font-bold text-emerald-400 block">${(totalTokens / (responseCount || 1)).toFixed(0)}</span>
                </div>
                <div class="dashboard-card p-4 rounded-2xl border border-slate-800 bg-slate-800/20">
                    <span class="text-[9px] font-bold text-slate-500 uppercase tracking-widest block mb-1">Session Total</span>
                    <span class="text-lg font-bold text-blue-400 block">${totalTokens.toLocaleString()}</span>
                </div>
            `;

            toolsArray.forEach(t => {
                toolTable.innerHTML += `<div class="flex items-center justify-between p-3 bg-black/20 rounded-xl border border-slate-800"><span class="text-sm font-mono text-slate-300">${t.name}</span><span class="text-xs font-bold text-amber-500">${t.avg.toFixed(2)}s <span class="text-[10px] text-slate-600 font-normal tracking-tight">avg</span></span></div>`;
            });

            // Turn Rendering
            traces.forEach((trace, idx) => {
                const turnCard = document.createElement('div');
                turnCard.className = "bg-[#0d111c] border border-slate-800 rounded-3xl overflow-hidden mb-6";
                const span = (trace.spans || [])[0]; const messages = span?.outputs?.result?.messages || [];
                let human = "", ai = "", aiTkn = 0, model = "LLM", tools = [];

                messages.forEach((msg, mIdx) => {
                    if(msg.type === 'human' || msg.data?.type === 'human') human = msg.data?.content || msg.content;
                    if(msg.type === 'ai' || msg.data?.type === 'ai') {
                        ai = msg.data?.content || msg.content || ai; aiTkn = getMsgTokens(msg);
                        model = msg.data?.additional_kwargs?.model_name || msg.metadata?.model || "GPT-4o";
                        (msg.data?.tool_calls || msg.tool_calls || []).forEach(call => {
                            let toolMsg = messages.find(m => m.type === 'tool' && (m.id === call.id || m.data?.id === call.id));
                            const toolTime = toolMsg?.metadata?.duration || getDuration(trace.start_time, trace.end_time).toFixed(2);
                            const toolTkns = toolMsg?.usage_metadata?.total_tokens || 0;
                            tools.push({ name: call.name, args: call.args, output: toolMsg?.data?.content || "No output", time: toolTime, tokens: toolTkns });
                        });
                    }
                });

                turnCard.innerHTML = `
                    <div class="px-8 py-4 bg-[#161b29]/50 flex justify-between items-center cursor-pointer" onclick="toggleBox(this)">
                        <div class="flex items-center gap-4">
                            <span class="bg-blue-600 text-[10px] font-black px-2 py-1 rounded text-white uppercase">Turn ${traces.length - idx}</span>
                            <span class="text-[11px] text-slate-500 font-mono">${new Date(trace.start_time).toLocaleTimeString()}</span>
                            <div class="flex items-center gap-2 border-l border-slate-800 pl-4">
                                <span class="text-[10px] font-mono text-emerald-500 bg-emerald-500/5 px-2 rounded border border-emerald-500/10">${aiTkn.toLocaleString()} tkn</span>
                                <span class="text-[10px] font-mono text-amber-500 bg-amber-500/5 px-2 rounded border border-amber-500/10">${getDuration(trace.start_time, trace.end_time).toFixed(2)}s</span>
                            </div>
                        </div>
                        <i data-lucide="chevron-down" class="w-4 h-4 text-slate-500 transition-transform chevron-icon ${idx === 0 ? 'rotate-180' : ''}"></i>
                    </div>
                    <div class="collapsible-content ${idx === 0 ? 'open' : ''}">
                        <div class="p-8 space-y-8">
                            <div class="flex gap-5">
                                <div class="w-8 h-8 rounded-lg bg-slate-800 border border-slate-700 flex items-center justify-center shrink-0 text-slate-400"><i data-lucide="user" class="w-4 h-4"></i></div>
                                <div class="flex-1"><span class="text-[9px] font-bold text-slate-500 uppercase tracking-widest block mb-1">Human</span><p class="text-white font-semibold">${human}</p></div>
                            </div>
                            ${tools.length ? `<div class="space-y-4">
                                ${tools.map(t => `<div class="bg-black/20 border border-amber-500/20 rounded-2xl overflow-hidden">
                                    <div class="px-4 py-2 bg-amber-500/5 border-b border-amber-500/10 flex justify-between items-center">
                                        <div class="flex items-center gap-2"><i data-lucide="box" class="w-3 h-3 text-amber-500"></i><span class="text-[10px] font-black text-amber-500 uppercase">${t.name}</span></div>
                                        <div class="flex gap-3"><span class="text-[9px] font-mono text-amber-500/60">${t.tokens} tkn</span><span class="text-[9px] font-mono text-amber-500/60">${t.time}s</span></div>
                                    </div>
                                    <div class="grid grid-cols-2 divide-x divide-slate-800 p-4 gap-4">
                                        <div class="overflow-hidden"><span class="text-[9px] text-slate-500 uppercase block mb-1">Args</span><pre class="mono text-[10px] text-amber-200/60">${JSON.stringify(t.args, null, 2)}</pre></div>
                                        <div class="overflow-hidden"><span class="text-[9px] text-slate-500 uppercase block mb-1">Output</span><div class="mono text-[10px] text-emerald-400/80">${t.output}</div></div>
                                    </div>
                                </div>`).join('')}
                            </div>` : ''}
                            <div class="flex gap-5 bg-blue-500/5 p-6 rounded-2xl border border-blue-500/10 relative overflow-hidden">
                                <div class="absolute top-0 right-0 px-3 py-1 bg-blue-500/10 border-l border-b border-blue-500/20 rounded-bl-lg flex gap-3">
                                    <span class="text-[9px] font-black text-blue-400 uppercase tracking-widest">${model}</span>
                                    <span class="text-[9px] font-mono text-blue-300 opacity-60">${aiTkn} tkn</span>
                                </div>
                                <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center shrink-0 text-white shadow-lg shadow-blue-500/20"><i data-lucide="bot" class="w-4 h-4"></i></div>
                                <div class="flex-1"><span class="text-[9px] font-bold text-blue-500 uppercase tracking-widest block mb-1">AI Response</span><div class="text-slate-200 text-sm whitespace-pre-wrap">${ai}</div></div>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(turnCard);
            });
            lucide.createIcons();
        }

        function goHome() { document.getElementById('projectGallery').classList.remove('hidden'); document.getElementById('inspector').classList.add('hidden'); }
        function toggleTheme() { document.documentElement.classList.toggle('dark'); }
    </script>
</body>
</html>
